name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: get_version
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref_name }}
          release_name: Release ${{ steps.get_version.outputs.version }}
          body: |
            ## What's Changed

            See [CHANGELOG.md](https://github.com/nlord/rustane/blob/main/CHANGELOG.md) for details.
          draft: false
          prerelease: false

  publish-crates:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    needs: create-release

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: get_version
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ubuntu-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo index
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: ubuntu-cargo-index-${{ hashFiles('**/Cargo.lock') }}

      - name: Login to crates.io
        run: cargo login --token ${{ secrets.CRATES_IO_TOKEN }}

      - name: Publish to crates.io
        run: cargo publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}

  validate-release:
    name: Validate Release
    runs-on: macos-15
    needs: publish-crates

    steps:
      - name: Checkout Rustane
        uses: actions/checkout@v4

      - name: Checkout ANE bridge
        uses: actions/checkout@v4
        with:
          repository: maderix/ANE
          ref: main
          path: ANE

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Build ANE bridge
        working-directory: ANE/bridge
        run: make

      - name: Configure bridge paths
        run: |
          echo "ANE_BRIDGE_LIB_PATH=${GITHUB_WORKSPACE}/ANE/bridge" >> "$GITHUB_ENV"
          echo "ANE_BRIDGE_INCLUDE_PATH=${GITHUB_WORKSPACE}/ANE/bridge" >> "$GITHUB_ENV"

      - name: Check formatting
        run: cargo fmt --all --check

      - name: Run library and integration tests
        run: cargo test --locked --lib --tests

      - name: Run simple inference example
        run: cargo run --example simple_inference --quiet

      - name: Run error handling example
        run: cargo run --example error_handling_recovery --quiet

      - name: Run packed matmul benchmark
        run: cargo run --example ane_dynamic_matmul_benchmark --quiet

      - name: Run tiled rectangular benchmark
        run: cargo run --example ane_tiled_rectangular_matmul_benchmark --quiet
